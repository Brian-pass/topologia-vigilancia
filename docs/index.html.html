<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Topología de Red - HikCentral</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.95em;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            background: #f8f9fa;
            flex-wrap: wrap;
        }

        .tab-button {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-button:hover {
            background: #e9ecef;
            color: #333;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .servidores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .servidor-card {
            border-left: 4px solid #667eea;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .servidor-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .servidor-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .servidor-card p {
            color: #666;
            font-size: 0.9em;
            margin: 5px 0;
        }

        .servidor-stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }

        .servidor-stat {
            flex: 1;
            text-align: center;
        }

        .servidor-stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .servidor-stat-label {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-section label {
            font-weight: 500;
            color: #333;
        }

        .filter-section select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .search-section input {
            width: 100%;
            max-width: 400px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .topology-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .topology-node {
            border: 3px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            max-width: 300px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .topology-node:hover {
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .topology-node h3 {
            color: #667eea;
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }

        .topology-node p {
            margin: 5px 0;
            color: #666;
            font-size: 0.95em;
        }

        .centrales-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            margin-top: 20px;
        }

        .central-card {
            border: 3px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .central-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .central-card h3 {
            margin: 0 0 10px 0;
            cursor: pointer;
            font-size: 1.1em;
        }

        .central-card p {
            margin: 5px 0;
            color: #666;
            font-size: 0.95em;
        }

        .expandible-list {
            display: none;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }

        .expandible-list.active {
            display: block;
        }

        .sucursal-item {
            border-left: 3px solid #667eea;
            padding-left: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
        }

        .sucursal-item-title {
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
        }

        .sucursal-item-title:hover {
            text-decoration: underline;
        }

        .sucursal-info {
            margin-top: 5px;
            font-size: 0.9em;
        }

        .nvr-item {
            border-left: 3px solid #666;
            padding-left: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            cursor: pointer;
        }

        .nvr-item-title {
            cursor: pointer;
            font-weight: bold;
            color: #333;
        }

        .nvr-item-title:hover {
            text-decoration: underline;
        }

        .nvr-info {
            margin-top: 5px;
            font-size: 0.85em;
        }

        .camara-item {
            border-left: 3px solid #999;
            padding-left: 10px;
            margin-bottom: 6px;
            padding: 6px;
            background: #efefef;
            border-radius: 3px;
            font-size: 0.85em;
        }

        .camara-item p {
            margin: 2px 0;
        }

        .cerrito-principal {
            text-align: center;
            margin-bottom: 40px;
        }

        .cerrito-card {
            border: 3px solid #8B00FF;
            border-radius: 8px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            max-width: 300px;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cerrito-card:hover {
            box-shadow: 0 8px 16px rgba(139, 0, 255, 0.3);
        }

        .cerrito-card h3 {
            color: #8B00FF;
            margin: 0 0 10px 0;
        }

        .cerrito-card p {
            margin: 5px 0;
            color: #666;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 Topología de Red HikCentral</h1>
            <p>Sistema de Vigilancia Distribuido - Visualización Jerárquica</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalCamaras">0</h3>
                <p>Cámaras Totales</p>
            </div>
            <div class="stat-card">
                <h3 id="totalCentrales">0</h3>
                <p>Centrales</p>
            </div>
            <div class="stat-card">
                <h3 id="totalSucursales">0</h3>
                <p>Sucursales</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-button active" data-tab="resumen">📊 Resumen</button>
            <button class="tab-button" data-tab="graficos">📈 Gráficos</button>
            <button class="tab-button" data-tab="tabla">📋 Tabla</button>
            <button class="tab-button" data-tab="topologia">🗺️ Topología</button>
        </div>

        <!-- TAB: RESUMEN -->
        <div id="resumen" class="tab-content active">
            <h2>Resumen General</h2>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
            <div class="servidores-grid" id="servidoresContainer"></div>
        </div>

        <!-- TAB: GRÁFICOS -->
        <div id="graficos" class="tab-content">
            <h2>Gráficos de Distribución</h2>
            <div class="filter-section">
                <label for="regionFilter">Filtrar por Región:</label>
                <select id="regionFilter">
                    <option value="">Todas las Regiones</option>
                </select>
            </div>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- TAB: TABLA -->
        <div id="tabla" class="tab-content">
            <h2>Tabla de Sucursales</h2>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Buscar sucursal, región, etc...">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Sucursal</th>
                        <th>Región</th>
                        <th>NVRs</th>
                        <th>Cámaras</th>
                        <th>Tamaño Vínculo</th>
                        <th>Central</th>
                    </tr>
                </thead>
                <tbody id="tablaSucursales"></tbody>
            </table>
        </div>

        <!-- TAB: TOPOLOGÍA -->
        <div id="topologia" class="tab-content">
            <h2>Topología Jerárquica</h2>
            <div class="topology-container" id="topologyContainer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
